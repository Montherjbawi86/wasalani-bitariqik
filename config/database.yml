# config/database.yml - CORRECTED VERSION

# Anchor definition MUST come FIRST
default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: wasalani_bitariqik_development
  # Optional: uncomment if you need specific host/port
  # host: localhost
  # port: 5432

# Only ONE test section - remove the duplicate
test:
  <<: *default
  database: wasalani_bitariqik_test
  host: localhost
  port: 5432

# IMPORTANT: For Heroku, production should only use DATABASE_URL
production:
  <<: *default
  url: <%= ENV['DATABASE_URL'] %>
