# PostgreSQL. Versions 9.3 and up are supported.
#
# Install the pg driver:
#   gem install pg
# On macOS with Homebrew:
#   gem install pg -- --with-pg-config=/usr/local/bin/pg_config

default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: wasalani_bitariqik_development
  # Optional: uncomment if you need specific host/port
  # host: localhost
  # port: 5432

test:
  <<: *default
  database: wasalani_bitariqik_test

# IMPORTANT: For Heroku, production should only use DATABASE_URL
production:
  <<: *default
  url: <%= ENV['DATABASE_URL'] %>
